<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.1" />
    </filter>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="50%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#F472B6" />
    </linearGradient>
  </defs>

  <style>
    @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.4; } }
    .title { font: 900 86px 'Inter', system-ui, sans-serif; fill: #1E293B; }
    .subtitle { font: 300 24px 'Fira Code', monospace; fill: #64748B; letter-spacing: 0.5em; text-transform: uppercase; }
    .hud-label { font: bold 9px 'Fira Code', monospace; fill: #94A3B8; }
    .dot-line { stroke: #CBD5E1; stroke-width: 0.5; stroke-dasharray: 2 6; }
    .accent { fill: url(#mainGrad); }
  </style>

  <!-- Clean Background -->
  <rect width="1200" height="300" rx="30" fill="#ffffff"/>
  
  <!-- Subtle Coding Field -->
  <pattern id="codingGrid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
    <circle cx="40" cy="40" r="0.8" fill="#F1F5F9" />
    <path d="M 0 40 H 80 M 40 0 V 80" stroke="#F8FAFC" stroke-width="0.5" />
  </pattern>
  <rect width="1200" height="300" rx="30" fill="url(#codingGrid)"/>

  <!-- Left Side: Floating 3D Cube HUD -->
  <g transform="translate(100, 150)" style="animation: floating 4s ease-in-out infinite;">
    <rect x="-30" y="-30" width="60" height="60" rx="4" stroke="#E2E8F0" stroke-width="1" />
    <path d="M-20 -20 L20 20 M-20 20 L20 -20" stroke="#F1F5F9" />
    <circle r="4" class="accent" style="animation: pulse 2s infinite;" />
    <text y="50" text-anchor="middle" class="hud-label">OBJ_ROTATION: 360°</text>
  </g>

  <!-- Right Side: Circular HUD Diagnostic -->
  <g transform="translate(1100, 150)">
    <circle r="40" stroke="#F1F5F9" stroke-width="1" />
    <circle r="30" stroke="#22D3EE" stroke-width="1" stroke-dasharray="10 20">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
    <text y="55" text-anchor="middle" class="hud-label">SYS_DEBUG: 0</text>
  </g>

  <!-- Main Professional Hub -->
  <g transform="translate(600, 150)" filter="url(#softShadow)">
    <text text-anchor="middle" y="-20" class="title">JIBIN JOSE</text>
    <text text-anchor="middle" y="30" class="subtitle">Software Architect &amp; Game Dev</text>
    
    <!-- Premium Language String (Colored) -->
    <text text-anchor="middle" y="75" class="hud-label" font-size="12" letter-spacing="4px" fill="#475569">
      RUST • C++ • NESTJS • POSTGRES • UNREAL • NEXT.JS • AWS • DOCKER • TAURI
    </text>
  </g>

  <!-- Detailed Technical HUD Borders -->
  <g opacity="0.4">
    <path d="M 40 50 H 1160" class="dot-line" />
    <path d="M 40 250 H 1160" class="dot-line" />
    <text x="40" y="45" class="hud-label">PROCESS_LIST::ACTIVE</text>
    <text x="1160" y="45" text-anchor="end" class="hud-label">MEM_USAGE::OPTIMAL</text>
  </g>

  <!-- Corner Brackets (Advanced Design) -->
  <path d="M30 60V30H60" stroke="#1E293B" stroke-width="3" />
  <path d="M1140 30H1170V60" stroke="#1E293B" stroke-width="3" />
  <path d="M30 240V270H60" stroke="#1E293B" stroke-width="3" />
  <path d="M1140 270H1170V240" stroke="#1E293B" stroke-width="3" />

  <!-- Neon Progress Bar Section -->
  <g transform="translate(600, 210)">
    <rect x="-100" width="200" height="2" fill="#F1F5F9" rx="1" />
    <rect x="-100" width="140" height="2" class="accent" rx="1">
      <animate attributeName="width" values="0;200;140" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

</svg>

<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes moveX { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    @keyframes pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.6; } }
    .title { font: 900 82px 'Inter', sans-serif; fill: #1E293B; }
    .subtitle { font: 300 24px 'Fira Code', monospace; fill: #64748B; letter-spacing: 0.6em; text-transform: uppercase; }
    .tech-string { font: 500 12px 'Fira Code', monospace; fill: #818CF8; letter-spacing: 3px; }
    .hud-label { font: bold 10px sans-serif; fill: #94A3B8; letter-spacing: 1px; }
    .grid-dot { fill: #F1F5F9; }
    .accent-line { stroke: #22D3EE; stroke-width: 1; opacity: 0.2; }
  </style>

  <!-- Clean White Background -->
  <rect width="1200" height="300" rx="30" fill="#ffffff" stroke="#F1F5F9" stroke-width="1" />
  
  <!-- Subtle Grey Grid -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" class="grid-dot" />
  </pattern>
  <rect width="1200" height="300" rx="30" fill="url(#grid)" />

  <!-- Animated Scanner (White Version) -->
  <rect x="0" y="0" width="2" height="300" fill="#22D3EE" opacity="0.2">
    <animateTransform attributeName="transform" type="translate" from="-10 0" to="1210 0" dur="15s" repeatCount="indefinite" />
  </rect>

  <!-- Multi-Layered Borders -->
  <rect x="40" y="40" width="1120" height="220" rx="10" stroke="#F8FAFC" stroke-width="2" />
  
  <!-- Corner Technical Markers -->
  <g transform="translate(60, 60)">
    <path d="M 0 15 V 0 H 15" stroke="#1E293B" stroke-width="2" />
    <text x="20" y="10" class="hud-label">CORE::SYS_UP</text>
    <circle r="3" cx="5" cy="5" fill="#22D3EE" class="pulse" style="animation: pulse 2s infinite;" />
  </g>
  <g transform="translate(1140, 60)" text-anchor="end">
    <path d="M 0 15 V 0 H -15" stroke="#1E293B" stroke-width="2" />
    <text x="-20" y="10" class="hud-label">V.ARCHITECTURE.01</text>
  </g>

  <!-- Central Professional Layout -->
  <g transform="translate(600, 150)" filter="url(#shadow)">
    <text text-anchor="middle" y="-20" class="title">JIBIN JOSE</text>
    <text text-anchor="middle" y="30" class="subtitle">Software Architect &amp; Game Dev</text>
    <text text-anchor="middle" y="75" class="tech-string">
      C++ • RUST • NESTJS • POSTGRES • UNREAL • NEXT.JS • TAURI • AWS • DOCKER
    </text>
  </g>

  <!-- Bottom Data Bars -->
  <g transform="translate(60, 240)">
    <rect width="100" height="4" fill="#F1F5F9" rx="2" />
    <rect width="65" height="4" fill="#22D3EE" rx="2">
      <animate attributeName="width" values="0;65;40;65" dur="10s" repeatCount="indefinite" />
    </rect>
    <text x="0" y="20" class="hud-label" font-size="8">L-PROC::88%</text>
  </g>
  <g transform="translate(1140, 240)" text-anchor="end">
    <rect x="-100" width="100" height="4" fill="#F1F5F9" rx="2" />
    <rect x="-80" width="80" height="4" fill="#818CF8" rx="2">
      <animate attributeName="width" values="0;80;90;80" dur="12s" repeatCount="indefinite" />
    </rect>
    <text x="0" y="20" class="hud-label" font-size="8">R-XCODE::OPTIMIZED</text>
  </g>

  <!-- Connecting Visual Accents -->
  <circle cx="600" cy="210" r="2" fill="#E2E8F0" />
  <path d="M 500 210 H 700" stroke="#F1F5F9" stroke-width="0.5" />

</svg>

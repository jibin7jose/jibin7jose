<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top Languages</title>
  <desc id="desc">Language usage overview for jibin7jose public repositories.</desc>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="495" height="195" rx="6" fill="#141321"/>
  <rect x="0.5" y="0.5" width="494" height="194" rx="5.5" stroke="#30363D"/>

  <text x="24" y="34" fill="#FF6E96" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Top Languages</text>
  <text x="24" y="56" fill="#A9B1D6" font-family="Segoe UI, Arial, sans-serif" font-size="11">Aggregated from public source repositories</text>

  <g transform="translate(24 74)" filter="url(#glow)">
    <rect x="0" y="0" width="291.2" height="12" rx="6" fill="#3178C6"/>
    <rect x="291.2" y="0" width="47.7" height="12" fill="#DEA584"/>
    <rect x="338.9" y="0" width="44.4" height="12" fill="#F1E05A"/>
    <rect x="383.3" y="0" width="36.3" height="12" fill="#563D7C"/>
    <rect x="419.6" y="0" width="20.8" height="12" fill="#E34C26"/>
    <rect x="440.4" y="0" width="12.4" height="12" fill="#3572A5"/>
    <rect x="452.8" y="0" width="19.0" height="12" rx="6" fill="#00ADD8"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <circle cx="30" cy="111" r="5" fill="#3178C6"/>
    <text x="43" y="116" fill="#C9D1D9">TypeScript</text>
    <text x="159" y="116" fill="#A9B1D6">61.7%</text>

    <circle cx="251" cy="111" r="5" fill="#DEA584"/>
    <text x="264" y="116" fill="#C9D1D9">Rust</text>
    <text x="430" y="116" fill="#A9B1D6">10.1%</text>

    <circle cx="30" cy="135" r="5" fill="#F1E05A"/>
    <text x="43" y="140" fill="#C9D1D9">JavaScript</text>
    <text x="159" y="140" fill="#A9B1D6">9.4%</text>

    <circle cx="251" cy="135" r="5" fill="#563D7C"/>
    <text x="264" y="140" fill="#C9D1D9">CSS</text>
    <text x="430" y="140" fill="#A9B1D6">7.7%</text>

    <circle cx="30" cy="159" r="5" fill="#E34C26"/>
    <text x="43" y="164" fill="#C9D1D9">HTML</text>
    <text x="159" y="164" fill="#A9B1D6">4.4%</text>

    <circle cx="251" cy="159" r="5" fill="#3572A5"/>
    <text x="264" y="164" fill="#C9D1D9">Python</text>
    <text x="430" y="164" fill="#A9B1D6">2.6%</text>
  </g>
</svg>

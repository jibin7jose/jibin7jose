<svg width="720" height="260" viewBox="0 0 720 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top Languages</title>
  <desc id="desc">Language usage overview for jibin7jose public repositories.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="720" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#090E1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="32" y1="0" x2="688" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#7C7CFF"/>
      <stop offset="1" stop-color="#FF2BD6"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="720" height="260" rx="8" fill="url(#card)"/>
  <rect x="0.5" y="0.5" width="719" height="259" rx="7.5" stroke="#243043"/>
  <path d="M32 68H688" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="662" cy="34" r="38" fill="#00E5FF" opacity="0.08"/>
  <circle cx="676" cy="52" r="56" fill="#FF2BD6" opacity="0.06"/>


<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="3D stats frame">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1626"/>
      <stop offset="100%" stop-color="#162b3f"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#7cffc4"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="18" y="18" width="864" height="184" rx="18" fill="url(#frame)" filter="url(#shadow)"/>
  <rect x="18" y="18" width="864" height="184" rx="18" fill="none" stroke="url(#rim)" stroke-width="3"/>
  <text x="60" y="82" fill="#e6f6ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    3D Stats Frame
  </text>
  <text x="60" y="115" fill="#9cc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    Live stats appear below
  </text>
  <rect x="60" y="130" width="320" height="10" fill="#00e5ff" opacity="0.7"/>
  <rect x="60" y="150" width="220" height="10" fill="#7cffc4" opacity="0.7"/>
</svg>

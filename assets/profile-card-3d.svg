<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="3D profile card">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1b2a"/>
      <stop offset="100%" stop-color="#0f2f4a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7cffc4"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="860" height="280" rx="22" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="20" y="20" width="860" height="280" rx="22" fill="none" stroke="url(#edge)" stroke-width="3"/>
  <circle cx="120" cy="160" r="58" fill="#0b0f1a" stroke="#00e5ff" stroke-width="3"/>
  <path d="M90 160 h60 M120 130 v60" stroke="#00e5ff" stroke-width="3"/>
  <text x="210" y="135" fill="#e6f6ff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Jibin Jose
  </text>
  <text x="210" y="172" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Software Engineer • Full‑Stack • UI/UX
  </text>
  <text x="210" y="208" fill="#9cc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    React • NestJS • PostgreSQL • AWS
  </text>
  <text x="210" y="236" fill="#7cffc4" font-family="Segoe UI, Arial, sans-serif" font-size="12">

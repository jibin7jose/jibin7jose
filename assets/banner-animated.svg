<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Animated banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="50%" stop-color="#102a43"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
      <animate attributeName="x1" values="0;1;0" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0;1" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.0"/>
      <animate attributeName="x1" values="-0.2;1.2;-0.2" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0.2;1.6;0.2" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect x="0" y="120" width="1200" height="60" fill="url(#glow)" opacity="0.7"/>
  <g filter="url(#softShadow)">
    <text x="60" y="140" fill="#e6f6ff" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">
      Jibin Jose
    </text>
    <text x="60" y="182" fill="#9cc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      Futuristic Full‑Stack Engineer • React • NestJS • PostgreSQL
    </text>
  </g>
  <g opacity="0.25">
    <path d="M0 260 L1200 220" stroke="#00e5ff" stroke-width="2"/>
    <path d="M0 240 L1200 200" stroke="#2de2ff" stroke-width="1"/>
    <path d="M0 280 L1200 240" stroke="#00b5d8" stroke-width="1"/>
  </g>
</svg>
